async function gistGet() {
  const res = await fetch(`${FIREBASE_DB_URL}/${FIREBASE_PATH}.json`);
  if (!res.ok) throw new Error(`Laden fehlgeschlagen (${res.status})`);
  const data = await res.json();
  return data || null;
}

async function gistSet(dataObj) {
  const res = await fetch(`${FIREBASE_DB_URL}/${FIREBASE_PATH}.json`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(dataObj),
  });
  if (!res.ok) throw new Error(`Speichern fehlgeschlagen (${res.status})`);
}

async function saveBackup(dataObj) {
  const key = new Date().toISOString().replace(/[.:]/g, "-");
  const res = await fetch(`${FIREBASE_DB_URL}/backups/${key}.json`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(dataObj),
  });
  if (!res.ok) throw new Error(`Sicherung fehlgeschlagen (${res.status})`);
  return key;
}

// Hält die Reihenfolge Spieler (nach Kaderliste/Nummer) -> neu hinzugefügte Spieler -> Trainer/Staff
function orderPlayers(list) {
  const set = new Set(list);
  const roster = ROSTER_PLAYERS.filter((p) => set.has(p));
  const staff = STAFF.filter((p) => set.has(p));
  const known = new Set([...ROSTER_PLAYERS, ...STAFF]);
  const extras = list.filter((p) => !known.has(p));
  return [...roster, ...extras, ...staff];
}
function splitByGroup(list) {
  return {
    spieler: list.filter((p) => !isStaff(p)),
    staff: list.filter((p) => isStaff(p)),
  };
}

function addDaysISO(iso, days) {
  const d = new Date(iso + "T00:00:00");
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}
function nextMonthFirstISO(iso) {
  const d = new Date(iso + "T00:00:00");
  const next = new Date(d.getFullYear(), d.getMonth() + 1, 1);
  return `${next.getFullYear()}-${String(next.getMonth() + 1).padStart(2, "0")}-01`;
}
function monthYearLabel(iso) {
  if (!iso) return "–";
  const [y, m] = iso.split("-").map(Number);
  return `${MONTH_NAMES[m - 1]} ${y}`;
}
function fmtDate(iso) {
  if (!iso) return "–";
  const [y, m, d] = iso.split("-");
  return `${d}.${m}.${y}`;
}
function monthKey(iso) {
  return iso.slice(0, 7);
}
function uid() {
  return Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
}

function isOverdue(entry) {
  if (entry.bezahlt) return false;
  if (!entry.faelligAm) return false;
  const frist = addDaysISO(entry.faelligAm, 7);
  return todayISO() > frist;
}
function effectiveBetrag(entry) {
  if (entry.art === "kasten") return 0;
  const base = Number(entry.betrag) || 0;
  if (entry.bezahlt) {
    return entry.verdoppeltBeiZahlung ? base * 2 : base;
  }
  return isOverdue(entry) ? base * 2 : base;
}
function effectiveKastenAnzahl(entry) {
  const base = Number(entry.kastenAnzahl) || 0;
  if (entry.bezahlt) {
    return entry.verdoppeltBeiZahlung ? base * 2 : base;
  }
  return isOverdue(entry) ? base * 2 : base;
}
function formatEntryWert(entry) {
  if (entry.art === "kasten") {
    const eff = effectiveKastenAnzahl(entry);
    return `${eff} ${eff === 1 ? "Kasten" : "Kästen"}`;
  }
  return `${effectiveBetrag(entry).toFixed(2)} €`;
}
function formatEntryWertBasis(entry) {
  if (entry.art === "kasten") {
    const base = Number(entry.kastenAnzahl) || 0;
    return `${base} ${base === 1 ? "Kasten" : "Kästen"}`;
  }
  return `${Number(entry.betrag).toFixed(2)} €`;
}
function statusOf(entry) {
  if (entry.bezahlt) return { label: "Bezahlt", cls: "bg-emerald-100 text-emerald-700 border-emerald-300" };
  if (isOverdue(entry)) return { label: "Überfällig · verdoppelt", cls: "bg-red-100 text-red-700 border-red-300" };
  return { label: "Offen", cls: "bg-amber-100 text-amber-700 border-amber-300" };
}

let jsPDFLoadPromise = null;
function loadJsPDF() {
  if (window.jspdf && window.jspdf.jsPDF) return Promise.resolve();
  if (jsPDFLoadPromise) return jsPDFLoadPromise;
  jsPDFLoadPromise = new Promise((resolve, reject) => {
    const script = document.createElement("script");
    script.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
    script.onload = () => resolve();
    script.onerror = () => reject(new Error("PDF-Bibliothek konnte nicht geladen werden"));
    document.head.appendChild(script);
  });
  return jsPDFLoadPromise;
}

function drawPdfHeader(doc, title, subtitle) {
  const PAGE_W = 210;
  doc.setFillColor(24, 49, 97);
  doc.rect(0, 0, PAGE_W, 30, "F");
  doc.setFillColor(37, 78, 145);
  doc.rect(0, 28, PAGE_W, 2, "F");
  doc.setTextColor(255, 255, 255);
  doc.setFont(undefined, "bold");
  doc.setFontSize(15);
  doc.text("Inkasso DMS", 14, 14);
  doc.setFont(undefined, "normal");
  doc.setFontSize(9);
  doc.setTextColor(200, 213, 232);
  doc.text("FC Denzlingen · Saison 26/27", 14, 21);

  doc.setTextColor(20, 24, 33);
  doc.setFont(undefined, "bold");
  doc.setFontSize(15);
  doc.text(title, 14, 42);
  doc.setFont(undefined, "normal");
  doc.setFontSize(10);
  doc.setTextColor(120, 128, 140);
  doc.text(subtitle, 14, 49);
  return 62;
}

function drawPdfFooter(doc) {
  const pageCount = doc.internal.getNumberOfPages();
  for (let i = 1; i <= pageCount; i++) {
    doc.setPage(i);
    doc.setFontSize(8);
    doc.setTextColor(160, 160, 160);
    doc.text(`Erstellt am ${fmtDate(todayISO())} · Inkasso DMS`, 14, 289);
    doc.text(`Seite ${i}/${pageCount}`, 196, 289, { align: "right" });
  }
}

async function createAndSharePdf({ title, subtitle, rows, totalLabel, totalValue, filename }) {
  await loadJsPDF();
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const ROW_H = 9;
  const PAGE_BOTTOM = 275;

  let y = drawPdfHeader(doc, title, subtitle);

  doc.setFontSize(10.5);
  rows.forEach((r, i) => {
    if (y > PAGE_BOTTOM) {
      doc.addPage();
      y = drawPdfHeader(doc, title, subtitle);
    }
    if (i % 2 === 1) {
      doc.setFillColor(245, 248, 251);
      doc.rect(10, y - 6, 190, ROW_H, "F");
    }
    doc.setTextColor(40, 44, 52);
    doc.setFont(undefined, "normal");
    const leftText = doc.splitTextToSize(String(r.left), 130);
    doc.text(leftText, 14, y);
    doc.setFont(undefined, "bold");
    doc.text(String(r.right), 196, y, { align: "right" });
    y += ROW_H * Math.max(1, leftText.length ? leftText.length : 1);
  });

  if (totalLabel) {
    y += 3;
    doc.setDrawColor(24, 49, 97);
    doc.setLineWidth(0.6);
    doc.line(14, y, 196, y);
    y += 9;
    doc.setFontSize(12.5);
    doc.setFont(undefined, "bold");
    doc.setTextColor(24, 49, 97);
    doc.text(totalLabel, 14, y);
    doc.text(totalValue, 196, y, { align: "right" });
  }

  drawPdfFooter(doc);

  const blob = doc.output("blob");
  const file = new File([blob], filename, { type: "application/pdf" });

  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title });
      return "shared";
    } catch (e) {
      if (e && e.name === "AbortError") return "cancelled";
    }
  }
  const url = URL.createObjectURL(blob);
  const opened = window.open(url, "_blank");
  if (!opened) {
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }
  setTimeout(() => URL.revokeObjectURL(url), 20000);
  return "downloaded";
}

  function openEmbeddedPdf(dataUri, filename) {
    try {
      const base64 = dataUri.split(",")[1];
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      const blob = new Blob([bytes], { type: "application/pdf" });
      const url = URL.createObjectURL(blob);
      const win = window.open(url, "_blank");
      if (!win) {
        // Popup blockiert -> als Fallback Download anstoßen
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      }
      setTimeout(() => URL.revokeObjectURL(url), 60000);
    } catch (e) {
      setError(`PDF konnte nicht geöffnet werden (${e.message || e}).`);
    }
  }

  async function runBackup() {
    setBackupBusy(true);
    try {
      const snapshot = { players, strafen, ausgaben, einnahmen, umbuchungen, auslagen };
      await saveBackup(snapshot);
      const heute = todayISO();
      const gespeichert = await persist(players, strafen, ausgaben, einnahmen, umbuchungen, auslagen, heute);

      const blob = new Blob([JSON.stringify(snapshot, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `inkasso-dms-sicherung-${heute}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 8000);

      if (gespeichert) {
        setLetzteSicherung(heute);
        setToast("Sicherung erstellt ✓");
      } else {
        setError(
          "Sicherungsdatei wurde heruntergeladen, aber das Sicherungsdatum konnte nicht in der Datenbank gespeichert werden. Bitte Internetverbindung prüfen und nochmal versuchen."

    } finally {
      setBackupBusy(false);
    }
  }

  const tageSeitSicherung = useMemo(() => {
    if (!letzteSicherung) return null;
    const d1 = new Date(letzteSicherung + "T00:00:00");
    const d2 = new Date(todayISO() + "T00:00:00");
    return Math.round((d2 - d1) / (1000 * 60 * 60 * 24));
  }, [letzteSicherung]);

  const sicherungFaellig = tageSeitSicherung === null || tageSeitSicherung >= 7;

    const next = orderPlayers([...players, trimmed]);
    setPlayers(next);
    persist(next, strafen, ausgaben);
    setForm((f) => ({ ...f, spieler: trimmed }));

    setForm((f) => ({

      regel,
      art: "geld",
      betrag: item.betrag ?? "",

    }));
  }

  function handleDatumChange(datum) {
    setForm((f) => ({ ...f, datum, faelligAm: nextMonthFirstISO(datum) }));
  }

  function submitEntry(e) {
    e.preventDefault();
    const istKasten = form.art === "kasten";
    if (!form.regel) return;
    if (istKasten) {
      if (!(Number(form.kastenAnzahl) > 0)) {
        setError("Bitte eine gültige Anzahl Kästen eingeben.");
        return;
      }
    } else if (!(Number(form.betrag) > 0)) {
      setError("Bitte einen Betrag größer 0 eingeben.");
      return;
    }

    const gemeinsameFelder = {
      regel: form.regel,
      art: form.art,
      betrag: istKasten ? 0 : Number(form.betrag),
      kastenAnzahl: istKasten ? Number(form.kastenAnzahl) : 0,
      datum: form.datum,
      faelligAm: form.faelligAm,
      notiz: form.notiz.trim(),
      erfasstVon: meinKuerzel.trim() || null,
      bezahlt: false,
      bezahltAm: null,
      zahlungsart: null,
    };

    if (entryMode === "gruppe") {
      if (!selectedGroup || !GROUPS[selectedGroup]) return;
      const members = GROUPS[selectedGroup];
      const newEntries = members.map((spieler) => ({
        id: uid(),
        spieler,
        ...gemeinsameFelder,
      }));
      const next = [...newEntries, ...strafen];
      setStrafen(next);
      persist(players, next, ausgaben);
      setForm((f) => ({ ...f, notiz: "" }));
      setToast(`Strafe für ${members.length} Spieler aus „${selectedGroup}“ eingetragen ✓`);
      return;
    }

    if (!form.spieler) return;
    const entry = {
      id: uid(),
      spieler: form.spieler,
      ...gemeinsameFelder,
    };
    const next = [entry, ...strafen];
    setStrafen(next);
    persist(players, next, ausgaben);
    setForm((f) => ({ ...f, notiz: "" }));
    setToast(`Strafe für ${entry.spieler} eingetragen ✓`);

                className={`flex-1 py-2.5 rounded-xl border-2 text-sm font-semibold ${
                  einnahmeForm.zahlungsart === "bar" ? "border-emerald-300 bg-emerald-50 text-emerald-700" : "border-slate-200 text-slate-500"
                }`}
              >
                Bar
              </button>
              <button
                onClick={() => setEinnahmeForm((f) => ({ ...f, zahlungsart: "paypal" }))}
                className={`flex-1 py-2.5 rounded-xl border-2 text-sm font-semibold ${
                  einnahmeForm.zahlungsart === "paypal" ? "border-sky-300 bg-sky-50 text-sky-700" : "border-slate-200 text-slate-500"
                }`}
              >
                PayPal
              </button>
            </div>
            <div className="flex gap-2">
              <button
                onClick={() => setShowAddEinnahme(false)}
                className="flex-1 py-2.5 rounded-xl border border-slate-300 text-slate-600 text-sm font-medium"
              >
                Abbrechen
              </button>
              <button
                onClick={() => {
                  addEinnahme(einnahmeForm.betrag, einnahmeForm.beschreibung, einnahmeForm.datum, einnahmeForm.zahlungsart);
                  setEinnahmeForm({ betrag: "", beschreibung: "", datum: todayISO(), zahlungsart: "bar" });
                  setShowAddEinnahme(false);
                }}
                disabled={!(Number(einnahmeForm.betrag) > 0) || !einnahmeForm.beschreibung.trim()}
                className="flex-1 py-2.5 rounded-xl bg-gradient-to-br from-emerald-700 to-emerald-600 text-white text-sm font-semibold disabled:opacity-40"
              >
                Speichern
              </button>
            </div>
          </div>
        </div>
      )}

      {showAddAusgabe && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50">
          <div className="bg-white rounded-2xl p-5 w-full max-w-sm shadow-xl">
            <div className="flex items-center justify-between mb-3">
              <div className="font-semibold text-slate-800">Neue Entnahme</div>
              <button onClick={() => setShowAddAusgabe(false)}>
                <span className="text-slate-400" style={{ fontSize: 20, lineHeight: 1, display: "inline-block" }}>✕</span>
              </button>
            </div>
            <label className="text-xs font-semibold text-slate-500 block mb-1">Betrag (€)</label>
            <input
              type="number"
              step="0.5"
              min="0"
              value={ausgabeForm.betrag}
              onChange={(e) => setAusgabeForm((f) => ({ ...f, betrag: e.target.value }))}
              className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-base bg-white text-slate-800 mb-3"
            />
            <label className="text-xs font-semibold text-slate-500 block mb-1">Wofür?</label>
            <input
              value={ausgabeForm.beschreibung}
              onChange={(e) => setAusgabeForm((f) => ({ ...f, beschreibung: e.target.value }))}
              placeholder="z. B. Bälle, Getränke, Verbandskasten"
              className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-base bg-white text-slate-800 mb-3"
            />
            <label className="text-xs font-semibold text-slate-500 block mb-1">Datum</label>
            <input
              type="date"
              value={ausgabeForm.datum}
              onChange={(e) => setAusgabeForm((f) => ({ ...f, datum: e.target.value }))}
              className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-base bg-white text-slate-800 mb-3"
            />
            <label className="text-xs font-semibold text-slate-500 block mb-1">Zahlungsart</label>
            <div className="flex gap-2 mb-4">
              <button
                onClick={() => setAusgabeForm((f) => ({ ...f, zahlungsart: "bar" }))}
                className={`flex-1 py-2.5 rounded-xl border-2 text-sm font-semibold ${
                  ausgabeForm.zahlungsart === "bar" ? "border-emerald-300 bg-emerald-50 text-emerald-700" : "border-slate-200 text-slate-500"
                }`}
              >
                Bar
              </button>
              <button
                onClick={() => setAusgabeForm((f) => ({ ...f, zahlungsart: "paypal" }))}
                className={`flex-1 py-2.5 rounded-xl border-2 text-sm font-semibold ${
                  ausgabeForm.zahlungsart === "paypal" ? "border-sky-300 bg-sky-50 text-sky-700" : "border-slate-200 text-slate-500"
                }`}
              >
                PayPal
              </button>
            </div>
            <div className="flex gap-2">
              <button
                onClick={() => setShowAddAusgabe(false)}
                className="flex-1 py-2.5 rounded-xl border border-slate-300 text-slate-600 text-sm font-medium"
              >
                Abbrechen
              </button>
              <button
                onClick={() => {
                  addAusgabe(ausgabeForm.betrag, ausgabeForm.beschreibung, ausgabeForm.datum, ausgabeForm.zahlungsart);
                  setAusgabeForm({ betrag: "", beschreibung: "", datum: todayISO(), zahlungsart: "bar" });
                  setShowAddAusgabe(false);
                }}
                disabled={!(Number(ausgabeForm.betrag) > 0) || !ausgabeForm.beschreibung.trim()}
                className="flex-1 py-2.5 rounded-xl bg-gradient-to-br from-blue-900 to-blue-700 text-white text-sm font-semibold disabled:opacity-40"
              >
                Speichern
              </button>
            </div>
          </div>
        </div>
      )}

      {showAddUmbuchung && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50">
          <div className="bg-white rounded-2xl p-5 w-full max-w-sm shadow-xl">
            <div className="flex items-center justify-between mb-3">
              <div className="font-semibold text-slate-800">Umbuchung</div>
              <button onClick={() => setShowAddUmbuchung(false)}>
                <span className="text-slate-400" style={{ fontSize: 20, lineHeight: 1, display: "inline-block" }}>✕</span>
              </button>
            </div>
            <label className="text-xs font-semibold text-slate-500 block mb-1">Richtung</label>
            <div className="flex gap-2 mb-3">
              <button
                onClick={() => setUmbuchungForm((f) => ({ ...f, richtung: "paypal_zu_bar" }))}
                className={`flex-1 py-2.5 rounded-xl border-2 text-sm font-semibold ${
                  umbuchungForm.richtung === "paypal_zu_bar" ? "border-sky-300 bg-sky-50 text-sky-700" : "border-slate-200 text-slate-500"
                }`}
              >
                PayPal → Bar
              </button>
              <button
                onClick={() => setUmbuchungForm((f) => ({ ...f, richtung: "bar_zu_paypal" }))}
                className={`flex-1 py-2.5 rounded-xl border-2 text-sm font-semibold ${
                  umbuchungForm.richtung === "bar_zu_paypal" ? "border-emerald-300 bg-emerald-50 text-emerald-700" : "border-slate-200 text-slate-500"
                }`}
              >
                Bar → PayPal
              </button>
            </div>
            <label className="text-xs font-semibold text-slate-500 block mb-1">Betrag (€)</label>
            <input
              type="number"
              step="0.5"
              min="0"
              value={umbuchungForm.betrag}
              onChange={(e) => setUmbuchungForm((f) => ({ ...f, betrag: e.target.value }))}
              className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-base bg-white text-slate-800 mb-3"
            />
            <label className="text-xs font-semibold text-slate-500 block mb-1">Datum</label>
            <input
              type="date"
              value={umbuchungForm.datum}
              onChange={(e) => setUmbuchungForm((f) => ({ ...f, datum: e.target.value }))}
              className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-base bg-white text-slate-800 mb-4"
            />
            <div className="flex gap-2">
              <button
                onClick={() => setShowAddUmbuchung(false)}
                className="flex-1 py-2.5 rounded-xl border border-slate-300 text-slate-600 text-sm font-medium"
              >
                Abbrechen
              </button>
              <button
                onClick={() => {
                  addUmbuchung(umbuchungForm.betrag, umbuchungForm.datum, umbuchungForm.richtung);
                  setUmbuchungForm({ betrag: "", datum: todayISO(), richtung: "paypal_zu_bar" });
                  setShowAddUmbuchung(false);
                }}
                disabled={!(Number(umbuchungForm.betrag) > 0)}
                className="flex-1 py-2.5 rounded-xl bg-gradient-to-br from-sky-700 to-sky-600 text-white text-sm font-semibold disabled:opacity-40"
              >
                Speichern
              </button>
            </div>
          </div>
        </div>
      )}

      {showAddAuslage && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50">
          <div className="bg-white rounded-2xl p-5 w-full max-w-sm shadow-xl">
            <div className="flex items-center justify-between mb-3">
              <div className="font-semibold text-slate-800">Neue Auslage</div>
              <button onClick={() => setShowAddAuslage(false)}>
                <span className="text-slate-400" style={{ fontSize: 20, lineHeight: 1, display: "inline-block" }}>✕</span>
              </button>
            </div>
            <label className="text-xs font-semibold text-slate-500 block mb-1">Wer hat vorgestreckt?</label>
            <select
              value={auslageForm.person}
              onChange={(e) => setAuslageForm((f) => ({ ...f, person: e.target.value }))}
              className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-base bg-white text-slate-800 mb-3"
            >
              <option value="">Person auswählen …</option>
              <optgroup label="Spieler">
                {splitByGroup(players).spieler.map((p) => (
                  <option key={p} value={p}>{p}</option>
                ))}
              </optgroup>
              <optgroup label="Trainer & Staff">
                {splitByGroup(players).staff.map((p) => (
                  <option key={p} value={p}>{p}</option>
                ))}
              </optgroup>
            </select>
            <label className="text-xs font-semibold text-slate-500 block mb-1">Betrag (€)</label>
            <input
              type="number"
              step="0.5"
              min="0"
              value={auslageForm.betrag}
              onChange={(e) => setAuslageForm((f) => ({ ...f, betrag: e.target.value }))}
              className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-base bg-white text-slate-800 mb-3"
            />
            <label className="text-xs font-semibold text-slate-500 block mb-1">Wofür?</label>
            <input
              value={auslageForm.beschreibung}
              onChange={(e) => setAuslageForm((f) => ({ ...f, beschreibung: e.target.value }))}
              placeholder="z. B. neuer Ball"
              className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-base bg-white text-slate-800 mb-3"
            />
            <label className="text-xs font-semibold text-slate-500 block mb-1">Datum</label>
            <input
              type="date"
              value={auslageForm.datum}
              onChange={(e) => setAuslageForm((f) => ({ ...f, datum: e.target.value }))}
              className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-base bg-white text-slate-800 mb-4"
            />
            <div className="flex gap-2">
              <button
                onClick={() => setShowAddAuslage(false)}
                className="flex-1 py-2.5 rounded-xl border border-slate-300 text-slate-600 text-sm font-medium"
              >
                Abbrechen
              </button>
              <button
                onClick={() => {
                  addAuslage(auslageForm.person, auslageForm.betrag, auslageForm.beschreibung, auslageForm.datum);
                  setAuslageForm({ person: "", betrag: "", beschreibung: "", datum: todayISO() });
                  setShowAddAuslage(false);
                }}
                disabled={!auslageForm.person || !(Number(auslageForm.betrag) > 0) || !auslageForm.beschreibung.trim()}
                className="flex-1 py-2.5 rounded-xl bg-gradient-to-br from-orange-700 to-orange-600 text-white text-sm font-semibold disabled:opacity-40"
              >
                Speichern
              </button>
            </div>
          </div>
        </div>
      )}

      {showAddPlayer && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50">
          <div className="bg-white rounded-2xl p-5 w-full max-w-sm shadow-xl">
            <div className="flex items-center justify-between mb-3">
              <div className="font-semibold text-slate-800">Neuer Spieler</div>
              <button onClick={() => { setShowAddPlayer(false); setNewPlayerName(""); }}>
                <span className="text-slate-400" style={{ fontSize: 20, lineHeight: 1, display: "inline-block" }}>✕</span>
              </button>
            </div>
            <input
              autoFocus
              value={newPlayerName}
              onChange={(e) => setNewPlayerName(e.target.value)}
              placeholder="Name (Nummer)"
              className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-base bg-white text-slate-800 mb-3"
              onKeyDown={(e) => {
                if (e.key === "Enter") {
                  const trimmed = newPlayerName.trim();
                  if (!trimmed) return;
                  if (players.includes(trimmed)) {
                    setError("Dieser Name ist schon in der Liste.");
                    return;
                  }
                  addPlayer(newPlayerName);
                  setNewPlayerName("");
                  setShowAddPlayer(false);
                }
              }}
            />
            <div className="flex gap-2">
              <button
                onClick={() => { setShowAddPlayer(false); setNewPlayerName(""); }}
                className="flex-1 py-2.5 rounded-xl border border-slate-300 text-slate-600 text-sm font-medium"
              >
                Abbrechen
              </button>
              <button
                onClick={() => {
                  const trimmed = newPlayerName.trim();
                  if (players.includes(trimmed)) {
                    setError("Dieser Name ist schon in der Liste.");
                    return;
                  }
                  addPlayer(newPlayerName);
                  setNewPlayerName("");
                  setShowAddPlayer(false);
                }}
                disabled={!newPlayerName.trim()}
                className="flex-1 py-2.5 rounded-xl bg-gradient-to-br from-blue-900 to-blue-700 text-white text-sm font-semibold disabled:opacity-40"
              >
                Speichern
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<StrafenModul />);
</script>
</body>
</html>
