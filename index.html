async function gistGet() {
  const res = await fetch(`${FIREBASE_DB_URL}/${FIREBASE_PATH}.json`);
  if (!res.ok) throw new Error(`Laden fehlgeschlagen (${res.status})`);
  const data = await res.json();
  return data || null;
}

async function gistSet(dataObj) {
  const res = await fetch(`${FIREBASE_DB_URL}/${FIREBASE_PATH}.json`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(dataObj),
  });
  if (!res.ok) throw new Error(`Speichern fehlgeschlagen (${res.status})`);
}

async function saveBackup(dataObj) {
  const key = new Date().toISOString().replace(/[.:]/g, "-");
  const res = await fetch(`${FIREBASE_DB_URL}/backups/${key}.json`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(dataObj),
  });
  if (!res.ok) throw new Error(`Sicherung fehlgeschlagen (${res.status})`);
  return key;
}

  const set = new Set(list);

  const staff = STAFF.filter((p) => set.has(p));

  return [...roster, ...extras, ...staff];

    spieler: list.filter((p) => !isStaff(p)),

}

function todayISO() {
  return new Date().toISOString().slice(0, 10);
}
function addDaysISO(iso, days) {
  const d = new Date(iso + "T00:00:00");
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}
function nextMonthFirstISO(iso) {
  const d = new Date(iso + "T00:00:00");
  const next = new Date(d.getFullYear(), d.getMonth() + 1, 1);
  return `${next.getFullYear()}-${String(next.getMonth() + 1).padStart(2, "0")}-01`;
}
function monthYearLabel(iso) {
  if (!iso) return "–";
  const [y, m] = iso.split("-").map(Number);
  return `${MONTH_NAMES[m - 1]} ${y}`;
}
function fmtDate(iso) {
  if (!iso) return "–";
  const [y, m, d] = iso.split("-");
  return `${d}.${m}.${y}`;
}
function monthKey(iso) {
  return iso.slice(0, 7);
}
function uid() {
  return Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
}

function isOverdue(entry) {
  if (entry.bezahlt) return false;
  if (!entry.faelligAm) return false;
  const frist = addDaysISO(entry.faelligAm, 7);
  return todayISO() > frist;
}
function effectiveBetrag(entry) {
  const base = Number(entry.betrag) || 0;
  if (entry.bezahlt) {
    return entry.verdoppeltBeiZahlung ? base * 2 : base;
  }
  return isOverdue(entry) ? base * 2 : base;
}
function statusOf(entry) {
  if (entry.bezahlt) return { label: "Bezahlt", cls: "bg-emerald-100 text-emerald-700 border-emerald-300" };
  if (isOverdue(entry)) return { label: "Überfällig · verdoppelt", cls: "bg-red-100 text-red-700 border-red-300" };
  return { label: "Offen", cls: "bg-amber-100 text-amber-700 border-amber-300" };
}

let jsPDFLoadPromise = null;
function loadJsPDF() {
  if (window.jspdf && window.jspdf.jsPDF) return Promise.resolve();
  if (jsPDFLoadPromise) return jsPDFLoadPromise;
  jsPDFLoadPromise = new Promise((resolve, reject) => {
    const script = document.createElement("script");
    script.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
    script.onload = () => resolve();
    script.onerror = () => reject(new Error("PDF-Bibliothek konnte nicht geladen werden"));
    document.head.appendChild(script);
  });
  return jsPDFLoadPromise;
}

function drawPdfHeader(doc, title, subtitle) {
  const PAGE_W = 210;
  doc.setFillColor(24, 49, 97);
  doc.rect(0, 0, PAGE_W, 30, "F");
  doc.setFillColor(37, 78, 145);
  doc.rect(0, 28, PAGE_W, 2, "F");
  doc.setTextColor(255, 255, 255);
  doc.setFont(undefined, "bold");
  doc.setFontSize(15);
  doc.text("Inkasso DMS", 14, 14);
  doc.setFont(undefined, "normal");
  doc.setFontSize(9);
  doc.setTextColor(200, 213, 232);
  doc.text("FC Denzlingen · Saison 26/27", 14, 21);

  doc.setTextColor(20, 24, 33);
  doc.setFont(undefined, "bold");
  doc.setFontSize(15);
  doc.text(title, 14, 42);
  doc.setFont(undefined, "normal");
  doc.setFontSize(10);
  doc.setTextColor(120, 128, 140);
  doc.text(subtitle, 14, 49);
  return 62;
}

function drawPdfFooter(doc) {
  const pageCount = doc.internal.getNumberOfPages();
  for (let i = 1; i <= pageCount; i++) {
    doc.setPage(i);
    doc.setFontSize(8);
    doc.setTextColor(160, 160, 160);
    doc.text(`Erstellt am ${fmtDate(todayISO())} · Inkasso DMS`, 14, 289);
    doc.text(`Seite ${i}/${pageCount}`, 196, 289, { align: "right" });
  }
}

async function createAndSharePdf({ title, subtitle, rows, totalLabel, totalValue, filename }) {
  await loadJsPDF();
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const ROW_H = 9;
  const PAGE_BOTTOM = 275;

  let y = drawPdfHeader(doc, title, subtitle);

  doc.setFontSize(10.5);
  rows.forEach((r, i) => {
    if (y > PAGE_BOTTOM) {
      doc.addPage();
      y = drawPdfHeader(doc, title, subtitle);
    }
    if (i % 2 === 1) {
      doc.setFillColor(245, 248, 251);
      doc.rect(10, y - 6, 190, ROW_H, "F");
    }
    doc.setTextColor(40, 44, 52);
    doc.setFont(undefined, "normal");
    const leftText = doc.splitTextToSize(String(r.left), 130);
    doc.text(leftText, 14, y);
    doc.setFont(undefined, "bold");
    doc.text(String(r.right), 196, y, { align: "right" });
    y += ROW_H * Math.max(1, leftText.length ? leftText.length : 1);
  });

  y += 3;
  doc.setDrawColor(24, 49, 97);
  doc.setLineWidth(0.6);
  doc.line(14, y, 196, y);
  y += 9;
  doc.setFontSize(12.5);
  doc.setFont(undefined, "bold");
  doc.setTextColor(24, 49, 97);
  doc.text(totalLabel, 14, y);
  doc.text(totalValue, 196, y, { align: "right" });

  drawPdfFooter(doc);

  const blob = doc.output("blob");
  const file = new File([blob], filename, { type: "application/pdf" });

  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title });
      return "shared";
    } catch (e) {
      if (e && e.name === "AbortError") return "cancelled";
    }
  }
  const url = URL.createObjectURL(blob);
  const opened = window.open(url, "_blank");
  if (!opened) {
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }
  setTimeout(() => URL.revokeObjectURL(url), 20000);
  return "downloaded";
}

    setUmbuchungen(next);

    const label = richtung === "paypal_zu_bar" ? "PayPal → Bar" : "Bar → PayPal";
    setToast(`Umbuchung ${label} (${val.toFixed(2)} €) eingetragen ✓`);
  }

  function deleteUmbuchung(id) {
    if (!window.confirm("Diese Umbuchung wirklich löschen?")) return;
    const next = umbuchungen.filter((u) => u.id !== id);
    setUmbuchungen(next);
    persist(players, strafen, ausgaben, einnahmen, next, auslagen);
  }

  function addAuslage(person, betrag, beschreibung, datum) {
    const val = Number(betrag);
    if (!val || val <= 0 || !beschreibung.trim() || !person) return;
    const entry = {
      id: uid(),
      person,
      betrag: val,
      beschreibung: beschreibung.trim(),
      datum,
      erstattet: false,
      erstattetAm: null,
      zahlungsart: null,
    };
    const next = [entry, ...auslagen];
    setAuslagen(next);
    persist(players, strafen, ausgaben, einnahmen, umbuchungen, next);
    setToast(`Auslage von ${person} eingetragen ✓`);
  }

  function scrollToSection(sectionId) {
    const el = document.getElementById(sectionId);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
  }

  function requestErstattung(id) {
    setAuslagePaymentPopup({ id });
  }

  function confirmErstattung(zahlungsart) {
    if (!auslagePaymentPopup) return;
    const next = auslagen.map((a) =>
      a.id === auslagePaymentPopup.id ? { ...a, erstattet: true, erstattetAm: todayISO(), zahlungsart } : a
    );
    setAuslagen(next);
    persist(players, strafen, ausgaben, einnahmen, umbuchungen, next);
    setAuslagePaymentPopup(null);
  }

  function undoErstattung(id) {
    const next = auslagen.map((a) =>
      a.id === id ? { ...a, erstattet: false, erstattetAm: null, zahlungsart: null } : a
    );
    setAuslagen(next);
    persist(players, strafen, ausgaben, einnahmen, umbuchungen, next);
  }

  function deleteAuslage(id) {
    if (!window.confirm("Diese Auslage wirklich löschen?")) return;
    const next = auslagen.filter((a) => a.id !== id);
    setAuslagen(next);
    persist(players, strafen, ausgaben, einnahmen, umbuchungen, next);
  }

  async function runBackup() {
    setBackupBusy(true);
    try {
      const snapshot = { players, strafen, ausgaben, einnahmen, umbuchungen, auslagen };
      await saveBackup(snapshot);
      const heute = todayISO();
      setLetzteSicherung(heute);
      persist(players, strafen, ausgaben, einnahmen, umbuchungen, auslagen, heute);

      const blob = new Blob([JSON.stringify(snapshot, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `inkasso-dms-sicherung-${heute}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 8000);

      setToast("Sicherung erstellt ✓");
    } catch (e) {
      setError("Sicherung fehlgeschlagen. Prüfe deine Internetverbindung und versuch's nochmal.");
    } finally {
      setBackupBusy(false);
    }
  }

  const tageSeitSicherung = useMemo(() => {
    if (!letzteSicherung) return null;
    const d1 = new Date(letzteSicherung + "T00:00:00");
    const d2 = new Date(todayISO() + "T00:00:00");
    return Math.round((d2 - d1) / (1000 * 60 * 60 * 24));
  }, [letzteSicherung]);

  const sicherungFaellig = tageSeitSicherung === null || tageSeitSicherung >= 7;

  function addPlayer(name) {
    const trimmed = name.trim();
    if (!trimmed || players.includes(trimmed)) return;
    const next = orderPlayers([...players, trimmed]);
    setPlayers(next);
    persist(next, strafen, ausgaben);
    setForm((f) => ({ ...f, spieler: trimmed }));
  }

  function handleCategoryChange(regel) {
    const item = FINE_CATALOG.find((i) => i.regel === regel);
    setForm((f) => ({
      ...f,
      regel,
      betrag: item.betrag ?? "",
    }));
  }

  function handleDatumChange(datum) {
    setForm((f) => ({ ...f, datum, faelligAm: nextMonthFirstISO(datum) }));
  }

  function submitEntry(e) {
    e.preventDefault();
    if (!form.regel || form.betrag === "") return;

    if (entryMode === "gruppe") {
      if (!selectedGroup || !GROUPS[selectedGroup]) return;
      const members = GROUPS[selectedGroup];
      const newEntries = members.map((spieler) => ({
        id: uid(),
        spieler,
        regel: form.regel,
        betrag: Number(form.betrag),
        datum: form.datum,
        faelligAm: form.faelligAm,
        notiz: form.notiz.trim(),
        bezahlt: false,
        bezahltAm: null,
        zahlungsart: null,
      }));
      const next = [...newEntries, ...strafen];
      setStrafen(next);
      persist(players, next, ausgaben);
      setForm((f) => ({ ...f, notiz: "" }));
      setToast(`Strafe für ${members.length} Spieler aus „${selectedGroup}“ eingetragen ✓`);
      return;
    }

    if (!form.spieler) return;
    const entry = {
      id: uid(),
      spieler: form.spieler,
      regel: form.regel,
      betrag: Number(form.betrag),
      datum: form.datum,
      faelligAm: form.faelligAm,
      notiz: form.notiz.trim(),
      bezahlt: false,
      bezahltAm: null,
      zahlungsart: null,
    };
    const next = [entry, ...strafen];
    setStrafen(next);
    persist(players, next, ausgaben);
    setForm((f) => ({ ...f, notiz: "" }));
    setToast(`Strafe für ${entry.spieler} eingetragen ✓`);
  }

  function requestTogglePaid(id) {
    const entry = strafen.find((s) => s.id === id);
    if (!entry) return;
    if (entry.bezahlt) {
      const next = strafen.map((s) =>
        s.id === id ? { ...s, bezahlt: false, bezahltAm: null, zahlungsart: null, verdoppeltBeiZahlung: false } : s
      );
      setStrafen(next);
      persist(players, next, ausgaben);
    } else {
      setPaymentPopup({ id });
    }
  }

  function confirmPayment(method) {
    if (!paymentPopup) return;
    const next = strafen.map((s) => {
      if (s.id !== paymentPopup.id) return s;
      const warUeberfaellig = isOverdue(s);
      return { ...s, bezahlt: true, bezahltAm: todayISO(), zahlungsart: method, verdoppeltBeiZahlung: warUeberfaellig };
    });
    setStrafen(next);
    persist(players, next, ausgaben);
    setPaymentPopup(null);
  }

  function deleteEntry(id) {

    const next = strafen.filter((s) => s.id !== id);

  const filteredList = useMemo(() => {

      .filter((s) => (filterSpieler ? s.spieler === filterSpieler : true))
      .filter((s) => (filterMonat ? monthKey(s.datum) === filterMonat : true))
      .filter((s) => (filterStatus ? (filterStatus === "offen" ? !s.bezahlt : s.bezahlt) : true))
      .sort((a, b) => (a.datum < b.datum ? 1 : -1));
  }, [strafen, filterSpieler, filterMonat, filterStatus]);

  const monthEntries = useMemo(
    () => strafen.filter((s) => monthKey(s.datum) === uebersichtMonth),
    [strafen, uebersichtMonth]
  );

  const fullMonthSummary = useMemo(() => {
    return players.map((p) => {
      const entries = monthEntries.filter((e) => e.spieler === p);
      const total = entries.reduce((s, e) => s + effectiveBetrag(e), 0);
      return { spieler: p, entries, total };
    });
  }, [players, monthEntries]);

  const kasseMonthSummary = useMemo(() => {
    return players
      .map((p) => {
        const entries = monthEntries.filter((e) => e.spieler === p);
        const paid = entries.filter((e) => e.bezahlt).reduce((s, e) => s + effectiveBetrag(e), 0);
        const open = entries.filter((e) => !e.bezahlt).reduce((s, e) => s + effectiveBetrag(e), 0);
        return { spieler: p, paid, open };
      })
      .filter((p) => p.paid > 0 || p.open > 0);
  }, [players, monthEntries]);

  const grandTotal = monthEntries.reduce((sum, e) => sum + effectiveBetrag(e), 0);

  function shiftMonth(delta) {
    const [y, m] = uebersichtMonth.split("-").map(Number);
    const d = new Date(y, m - 1 + delta, 1);
    setUebersichtMonth(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`);
  }

  const monthLabel = useMemo(() => monthYearLabel(uebersichtMonth + "-01"), [uebersichtMonth]);

  const paidEntries = useMemo(
    () => strafen.filter((s) => s.bezahlt).sort((a, b) => (a.bezahltAm < b.bezahltAm ? 1 : -1)),
    [strafen]
  );
  const openEntries = useMemo(() => strafen.filter((s) => !s.bezahlt), [strafen]);
  const totalEingenommen = paidEntries.reduce((s, e) => s + effectiveBetrag(e), 0);
  const totalBar = paidEntries.filter((e) => e.zahlungsart === "bar").reduce((s, e) => s + effectiveBetrag(e), 0);
  const totalPaypal = paidEntries.filter((e) => e.zahlungsart === "paypal").reduce((s, e) => s + effectiveBetrag(e), 0);
  const totalOffen = openEntries.reduce((s, e) => s + effectiveBetrag(e), 0);
  const sortedAusgaben = useMemo(() => [...ausgaben].sort((a, b) => (a.datum < b.datum ? 1 : -1)), [ausgaben]);
  const sortedEinnahmen = useMemo(() => [...einnahmen].sort((a, b) => (a.datum < b.datum ? 1 : -1)), [einnahmen]);
  const sortedUmbuchungen = useMemo(() => [...umbuchungen].sort((a, b) => (a.datum < b.datum ? 1 : -1)), [umbuchungen]);
  const sortedAuslagen = useMemo(() => [...auslagen].sort((a, b) => (a.datum < b.datum ? 1 : -1)), [auslagen]);
  const totalAusgaben = ausgaben.reduce((s, a) => s + Number(a.betrag), 0);
  const totalSonstigeEinnahmen = einnahmen.reduce((s, a) => s + Number(a.betrag), 0);
  const erstatteteAuslagen = auslagen.filter((a) => a.erstattet);
  const offeneAuslagen = auslagen.filter((a) => !a.erstattet);
  const totalErstattet = erstatteteAuslagen.reduce((s, a) => s + Number(a.betrag), 0);
  const totalOffeneAuslagen = offeneAuslagen.reduce((s, a) => s + Number(a.betrag), 0);
  // Kassenstand: was tatsächlich aktuell drin ist (bezahlte Strafen + sonstige Einnahmen − Ausgaben − erstattete Auslagen)
  const kassenstand = totalEingenommen + totalSonstigeEinnahmen - totalAusgaben - totalErstattet;

  // Saldo je Zahlungsart: Strafen (bezahlt) + sonstige Einnahmen − Ausgaben − erstattete Auslagen ± Umbuchungen
  const einnahmenBar = einnahmen.filter((e) => e.zahlungsart === "bar").reduce((s, e) => s + Number(e.betrag), 0);
  const einnahmenPaypal = einnahmen.filter((e) => e.zahlungsart === "paypal").reduce((s, e) => s + Number(e.betrag), 0);
  const ausgabenBar = ausgaben.filter((a) => a.zahlungsart === "bar").reduce((s, a) => s + Number(a.betrag), 0);
  const ausgabenPaypal = ausgaben.filter((a) => a.zahlungsart === "paypal").reduce((s, a) => s + Number(a.betrag), 0);
  const erstattetBar = erstatteteAuslagen.filter((a) => a.zahlungsart === "bar").reduce((s, a) => s + Number(a.betrag), 0);
  const erstattetPaypal = erstatteteAuslagen.filter((a) => a.zahlungsart === "paypal").reduce((s, a) => s + Number(a.betrag), 0);
  const umbuchungPaypalZuBar = umbuchungen.filter((u) => u.richtung === "paypal_zu_bar").reduce((s, u) => s + Number(u.betrag), 0);
  const umbuchungBarZuPaypal = umbuchungen.filter((u) => u.richtung === "bar_zu_paypal").reduce((s, u) => s + Number(u.betrag), 0);
  const barSaldo = totalBar + einnahmenBar - ausgabenBar - erstattetBar + umbuchungPaypalZuBar - umbuchungBarZuPaypal;
  const paypalSaldo = totalPaypal + einnahmenPaypal - ausgabenPaypal - erstattetPaypal - umbuchungPaypalZuBar + umbuchungBarZuPaypal;

      <div className="sticky top-0 z-10">

        <div className="w-11 h-11 rounded-xl bg-white/15 backdrop-blur flex items-center justify-center shrink-0 p-1.5">
          <img src={WAPPEN_SRC} alt="FC Denzlingen" className="w-full h-full object-contain" />
        </div>
        <div className="min-w-0 flex-1">

              <button
                onClick={() => setShowAddAuslage(false)}
                className="flex-1 py-2.5 rounded-xl border border-slate-300 text-slate-600 text-sm font-medium"
              >
                Abbrechen
              </button>
              <button
                onClick={() => {
                  addAuslage(auslageForm.person, auslageForm.betrag, auslageForm.beschreibung, auslageForm.datum);
                  setAuslageForm({ person: "", betrag: "", beschreibung: "", datum: todayISO() });
                  setShowAddAuslage(false);
                }}
                disabled={!auslageForm.person || !auslageForm.betrag || !auslageForm.beschreibung.trim()}
                className="flex-1 py-2.5 rounded-xl bg-gradient-to-br from-orange-700 to-orange-600 text-white text-sm font-semibold disabled:opacity-40"
              >
                Speichern
              </button>
            </div>
          </div>
        </div>
      )}

      {showAddPlayer && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50">
          <div className="bg-white rounded-2xl p-5 w-full max-w-sm shadow-xl">
            <div className="flex items-center justify-between mb-3">
              <div className="font-semibold text-slate-800">Neuer Spieler</div>
              <button onClick={() => { setShowAddPlayer(false); setNewPlayerName(""); }}>
                <span className="text-slate-400" style={{ fontSize: 20, lineHeight: 1, display: "inline-block" }}>✕</span>
              </button>
            </div>
            <input
              autoFocus
              value={newPlayerName}
              onChange={(e) => setNewPlayerName(e.target.value)}
              placeholder="Name (Nummer)"
              className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-base bg-white text-slate-800 mb-3"
              onKeyDown={(e) => {
                if (e.key === "Enter") {
                  addPlayer(newPlayerName);
                  setNewPlayerName("");
                  setShowAddPlayer(false);
                }
              }}
            />
            <div className="flex gap-2">
              <button
                onClick={() => { setShowAddPlayer(false); setNewPlayerName(""); }}
                className="flex-1 py-2.5 rounded-xl border border-slate-300 text-slate-600 text-sm font-medium"
              >
                Abbrechen
              </button>
              <button
                onClick={() => {
                  addPlayer(newPlayerName);
                  setNewPlayerName("");
                  setShowAddPlayer(false);
                }}
                disabled={!newPlayerName.trim()}
                className="flex-1 py-2.5 rounded-xl bg-gradient-to-br from-blue-900 to-blue-700 text-white text-sm font-semibold disabled:opacity-40"
              >
                Speichern
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<StrafenModul />);
</script>
</body>
</html>
