  return STAFF_SET.has(name);
}
// Hält die Reihenfolge Spieler (nach Kaderliste/Nummer) -> neu hinzugefügte Spieler -> Trainer/Staff
function orderPlayers(list) {
  const set = new Set(list);
  const roster = ROSTER_PLAYERS.filter((p) => set.has(p));
  const staff = STAFF.filter((p) => set.has(p));
  const known = new Set([...ROSTER_PLAYERS, ...STAFF]);
  const extras = list.filter((p) => !known.has(p));
  return [...roster, ...extras, ...staff];
}
function splitByGroup(list) {
  return {
    spieler: list.filter((p) => !isStaff(p)),
    staff: list.filter((p) => isStaff(p)),
  };
}


function todayISO() {
  return new Date().toISOString().slice(0, 10);
}
function addDaysISO(iso, days) {
  const d = new Date(iso + "T00:00:00");
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}
function nextMonthFirstISO(iso) {
  const d = new Date(iso + "T00:00:00");
  const next = new Date(d.getFullYear(), d.getMonth() + 1, 1);
  return `${next.getFullYear()}-${String(next.getMonth() + 1).padStart(2, "0")}-01`;
}
function monthYearLabel(iso) {
  if (!iso) return "–";
  const [y, m] = iso.split("-").map(Number);
  return `${MONTH_NAMES[m - 1]} ${y}`;
}
function fmtDate(iso) {
  if (!iso) return "–";
  const [y, m, d] = iso.split("-");
  return `${d}.${m}.${y}`;
}
function monthKey(iso) {
  return iso.slice(0, 7);
}
function uid() {
  return Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
}

function isOverdue(entry) {
  if (entry.bezahlt) return false;
  if (!entry.faelligAm) return false;
  const frist = addDaysISO(entry.faelligAm, 7);
  return todayISO() > frist;
}
function effectiveBetrag(entry) {
  const base = Number(entry.betrag) || 0;
  return isOverdue(entry) ? base * 2 : base;
}
function statusOf(entry) {
  if (entry.bezahlt) return { label: "Bezahlt", cls: "bg-emerald-100 text-emerald-700 border-emerald-300" };
  if (isOverdue(entry)) return { label: "Überfällig · verdoppelt", cls: "bg-red-100 text-red-700 border-red-300" };
  return { label: "Offen", cls: "bg-amber-100 text-amber-700 border-amber-300" };
}

let jsPDFLoadPromise = null;
function loadJsPDF() {
  if (window.jspdf && window.jspdf.jsPDF) return Promise.resolve();
  if (jsPDFLoadPromise) return jsPDFLoadPromise;
  jsPDFLoadPromise = new Promise((resolve, reject) => {
    const script = document.createElement("script");
    script.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
    script.onload = () => resolve();
    script.onerror = () => reject(new Error("PDF-Bibliothek konnte nicht geladen werden"));
    document.head.appendChild(script);
  });
  return jsPDFLoadPromise;
}

function drawPdfHeader(doc, title, subtitle) {
  const PAGE_W = 210;
  doc.setFillColor(24, 49, 97);
  doc.rect(0, 0, PAGE_W, 30, "F");
  doc.setFillColor(37, 78, 145);
  doc.rect(0, 28, PAGE_W, 2, "F");
  doc.setTextColor(255, 255, 255);
  doc.setFont(undefined, "bold");
  doc.setFontSize(15);
  doc.text("Inkasso DMS", 14, 14);
  doc.setFont(undefined, "normal");
  doc.setFontSize(9);
  doc.setTextColor(200, 213, 232);
  doc.text("FC Denzlingen · Saison 26/27", 14, 21);

  doc.setTextColor(20, 24, 33);
  doc.setFont(undefined, "bold");
  doc.setFontSize(15);
  doc.text(title, 14, 42);
  doc.setFont(undefined, "normal");
  doc.setFontSize(10);
  doc.setTextColor(120, 128, 140);
  doc.text(subtitle, 14, 49);
  return 62;
}

function drawPdfFooter(doc) {
  const pageCount = doc.internal.getNumberOfPages();
  for (let i = 1; i <= pageCount; i++) {
    doc.setPage(i);
    doc.setFontSize(8);
    doc.setTextColor(160, 160, 160);
    doc.text(`Erstellt am ${fmtDate(todayISO())} · Inkasso DMS`, 14, 289);
    doc.text(`Seite ${i}/${pageCount}`, 196, 289, { align: "right" });
  }
}

async function createAndSharePdf({ title, subtitle, rows, totalLabel, totalValue, filename }) {
  await loadJsPDF();
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const ROW_H = 9;
  const PAGE_BOTTOM = 275;

  let y = drawPdfHeader(doc, title, subtitle);

  doc.setFontSize(10.5);
  rows.forEach((r, i) => {
    if (y > PAGE_BOTTOM) {
      doc.addPage();
      y = drawPdfHeader(doc, title, subtitle);
    }
    if (i % 2 === 1) {
      doc.setFillColor(245, 248, 251);
      doc.rect(10, y - 6, 190, ROW_H, "F");
    }
    doc.setTextColor(40, 44, 52);
    doc.setFont(undefined, "normal");
    const leftText = doc.splitTextToSize(String(r.left), 130);
    doc.text(leftText, 14, y);
    doc.setFont(undefined, "bold");
    doc.text(String(r.right), 196, y, { align: "right" });
    y += ROW_H * Math.max(1, leftText.length ? leftText.length : 1);
  });

  y += 3;
  doc.setDrawColor(24, 49, 97);
  doc.setLineWidth(0.6);
  doc.line(14, y, 196, y);
  y += 9;
  doc.setFontSize(12.5);
  doc.setFont(undefined, "bold");
  doc.setTextColor(24, 49, 97);
  doc.text(totalLabel, 14, y);
  doc.text(totalValue, 196, y, { align: "right" });

  drawPdfFooter(doc);

  const blob = doc.output("blob");
  const file = new File([blob], filename, { type: "application/pdf" });

  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title });
      return "shared";
    } catch (e) {
      if (e && e.name === "AbortError") return "cancelled";
    }
  }
  const url = URL.createObjectURL(blob);
  const opened = window.open(url, "_blank");
  if (!opened) {
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }
  setTimeout(() => URL.revokeObjectURL(url), 20000);
  return "downloaded";
}

                      <span className="font-semibold text-red-700 text-sm">−{Number(a.betrag).toFixed(2)} €</span>
                      <button onClick={() => deleteAusgabe(a.id)} aria-label="Entnahme löschen">
                        <span className="text-slate-400" style={{ fontSize: 14, lineHeight: 1, display: "inline-block" }}>🗑</span>
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      )}

      {toast && (
        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-4 py-2.5 rounded-full shadow-lg flex items-center gap-2 text-sm font-medium z-50 max-w-xs">
          <span className="shrink-0" style={{ fontSize: 16, lineHeight: 1, display: "inline-block" }}>✅</span>
          <span className="break-words">{toast}</span>
        </div>
      )}

      {paymentPopup && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50">
          <div className="bg-white rounded-2xl p-5 w-full max-w-sm shadow-xl">
            <div className="font-semibold text-slate-800 mb-3">Wie wurde bezahlt?</div>
            <div className="flex gap-2 mb-2">
              <button
                onClick={() => confirmPayment("bar")}
                className="flex-1 py-3 rounded-xl border-2 border-emerald-300 bg-emerald-50 text-emerald-700 font-semibold text-sm"
              >
                Bar
              </button>
              <button
                onClick={() => confirmPayment("paypal")}
                className="flex-1 py-3 rounded-xl border-2 border-sky-300 bg-sky-50 text-sky-700 font-semibold text-sm"
              >
                PayPal
              </button>
            </div>
            <button onClick={() => setPaymentPopup(null)} className="w-full py-2 rounded-lg text-slate-500 text-sm">
              Abbrechen
            </button>
          </div>
        </div>
      )}

      {detailModal && (
        <div
          className="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50"
          onClick={() => setDetailModal(null)}
        >
          <div
            className="bg-white rounded-2xl p-5 w-full max-w-sm max-h-full overflow-y-auto shadow-xl"
            onClick={(e) => e.stopPropagation()}
          >
            <div className="flex items-center justify-between mb-1">
              <div className="font-semibold text-slate-800 break-words pr-2">{detailModal.player}</div>
              <button onClick={() => setDetailModal(null)} className="shrink-0">
                <span className="text-slate-400" style={{ fontSize: 20, lineHeight: 1, display: "inline-block" }}>✕</span>
              </button>
            </div>
            <div className="text-xs text-slate-400 mb-3">{detailModal.label}</div>
            <ul className="space-y-2 mb-4">
              {detailModal.entries.map((e) => (
                <li key={e.id} className="flex justify-between gap-2 text-sm text-slate-600">
                  <span className="min-w-0 break-words">{fmtDate(e.datum)} · {e.regel}</span>
                  <span className="font-semibold text-slate-800 shrink-0">{effectiveBetrag(e).toFixed(2)} €</span>
                </li>
              ))}
            </ul>
            <div className="flex justify-between font-bold text-blue-900 border-t border-slate-200 pt-2 mb-4">
              <span>Gesamt</span>
              <span>{detailModal.entries.reduce((s, e) => s + effectiveBetrag(e), 0).toFixed(2)} €</span>
            </div>
            <button
              onClick={() => shareDetailPdf(detailModal.player, detailModal.entries, detailModal.label)}
              disabled={pdfBusy}
              className="w-full flex items-center justify-center gap-1.5 py-3 rounded-xl bg-gradient-to-br from-blue-900 to-blue-700 text-white text-sm font-semibold shadow-md disabled:opacity-50"
            >
              {pdfBusy ? <span className="inline-block rounded-full border-2 border-current border-t-transparent animate-spin animate-spin" style={{ width: 16, height: 16 }}></span> : <span className="" style={{ fontSize: 16, lineHeight: 1, display: "inline-block" }}>📤</span>}
              Als PDF teilen
            </button>
          </div>
        </div>
      )}

      {showOffenModal && (
        <div
          className="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50"
          onClick={() => setShowOffenModal(false)}
        >
          <div
            className="bg-white rounded-2xl p-5 w-full max-w-sm max-h-full overflow-y-auto shadow-xl"
            onClick={(e) => e.stopPropagation()}
          >
            <div className="flex items-center justify-between mb-1">
              <div className="font-semibold text-slate-800">Offene Forderungen</div>
              <button onClick={() => setShowOffenModal(false)} className="shrink-0">
                <span className="text-slate-400" style={{ fontSize: 20, lineHeight: 1, display: "inline-block" }}>✕</span>
              </button>
            </div>
            <div className="text-xs text-slate-400 mb-3">Stand {fmtDate(todayISO())}</div>
            <ul className="space-y-2 mb-4">
              {[...openEntries]
                .sort((a, b) => a.spieler.localeCompare(b.spieler, "de"))
                .map((e) => (
                  <li key={e.id} className="flex justify-between gap-2 text-sm text-slate-600">
                    <span className="min-w-0 break-words">
                      <span className="font-medium text-slate-700">{e.spieler}</span> · {fmtDate(e.datum)} · {e.regel}
                    </span>
                    <span className="font-semibold text-slate-800 shrink-0">{effectiveBetrag(e).toFixed(2)} €</span>
                  </li>
                ))}
            </ul>
            <div className="flex justify-between font-bold text-amber-700 border-t border-slate-200 pt-2 mb-4">
              <span>Gesamt offen</span>
              <span>{totalOffen.toFixed(2)} €</span>
            </div>
            <button
              onClick={shareOffenPdf}
              disabled={pdfBusy}
              className="w-full flex items-center justify-center gap-1.5 py-3 rounded-xl bg-gradient-to-br from-blue-900 to-blue-700 text-white text-sm font-semibold shadow-md disabled:opacity-50"
            >
              {pdfBusy ? <span className="inline-block rounded-full border-2 border-current border-t-transparent animate-spin animate-spin" style={{ width: 16, height: 16 }}></span> : <span className="" style={{ fontSize: 16, lineHeight: 1, display: "inline-block" }}>📤</span>}
              Als PDF teilen
            </button>
          </div>
        </div>
      )}

      {showAddEinnahme && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50">
          <div className="bg-white rounded-2xl p-5 w-full max-w-sm shadow-xl">
            <div className="flex items-center justify-between mb-3">
              <div className="font-semibold text-slate-800">Neue Einnahme</div>
              <button onClick={() => setShowAddEinnahme(false)}>
                <span className="text-slate-400" style={{ fontSize: 20, lineHeight: 1, display: "inline-block" }}>✕</span>
              </button>
            </div>
            <label className="text-xs font-semibold text-slate-500 block mb-1">Betrag (€)</label>
            <input
              type="number"
              step="0.5"
              min="0"
              value={einnahmeForm.betrag}
              onChange={(e) => setEinnahmeForm((f) => ({ ...f, betrag: e.target.value }))}
              className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-base bg-white text-slate-800 mb-3"
            />
            <label className="text-xs font-semibold text-slate-500 block mb-1">Wofür / von wem?</label>
            <input
              value={einnahmeForm.beschreibung}
              onChange={(e) => setEinnahmeForm((f) => ({ ...f, beschreibung: e.target.value }))}
              placeholder="z. B. Sponsor Müller GmbH"
              className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-base bg-white text-slate-800 mb-3"
            />
            <label className="text-xs font-semibold text-slate-500 block mb-1">Datum</label>
            <input
              type="date"
              value={einnahmeForm.datum}
              onChange={(e) => setEinnahmeForm((f) => ({ ...f, datum: e.target.value }))}
              className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-base bg-white text-slate-800 mb-4"
            />
            <div className="flex gap-2">
              <button
                onClick={() => setShowAddEinnahme(false)}
                className="flex-1 py-2.5 rounded-xl border border-slate-300 text-slate-600 text-sm font-medium"
              >
                Abbrechen
              </button>
              <button
                onClick={() => {
                  addEinnahme(einnahmeForm.betrag, einnahmeForm.beschreibung, einnahmeForm.datum);
                  setEinnahmeForm({ betrag: "", beschreibung: "", datum: todayISO() });
                  setShowAddEinnahme(false);
                }}
                disabled={!einnahmeForm.betrag || !einnahmeForm.beschreibung.trim()}
                className="flex-1 py-2.5 rounded-xl bg-gradient-to-br from-emerald-700 to-emerald-600 text-white text-sm font-semibold disabled:opacity-40"
              >
                Speichern
              </button>
            </div>
          </div>
        </div>
      )}

      {showAddAusgabe && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50">
          <div className="bg-white rounded-2xl p-5 w-full max-w-sm shadow-xl">
            <div className="flex items-center justify-between mb-3">
              <div className="font-semibold text-slate-800">Neue Entnahme</div>
              <button onClick={() => setShowAddAusgabe(false)}>
                <span className="text-slate-400" style={{ fontSize: 20, lineHeight: 1, display: "inline-block" }}>✕</span>
              </button>
            </div>
            <label className="text-xs font-semibold text-slate-500 block mb-1">Betrag (€)</label>
            <input
              type="number"
              step="0.5"
              min="0"
              value={ausgabeForm.betrag}
              onChange={(e) => setAusgabeForm((f) => ({ ...f, betrag: e.target.value }))}
              className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-base bg-white text-slate-800 mb-3"
            />
            <label className="text-xs font-semibold text-slate-500 block mb-1">Wofür?</label>
            <input
              value={ausgabeForm.beschreibung}
              onChange={(e) => setAusgabeForm((f) => ({ ...f, beschreibung: e.target.value }))}
              placeholder="z. B. Bälle, Getränke, Verbandskasten"
              className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-base bg-white text-slate-800 mb-3"
            />
            <label className="text-xs font-semibold text-slate-500 block mb-1">Datum</label>
            <input
              type="date"
              value={ausgabeForm.datum}
              onChange={(e) => setAusgabeForm((f) => ({ ...f, datum: e.target.value }))}
              className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-base bg-white text-slate-800 mb-4"
            />
            <div className="flex gap-2">
              <button
                onClick={() => setShowAddAusgabe(false)}
                className="flex-1 py-2.5 rounded-xl border border-slate-300 text-slate-600 text-sm font-medium"
              >
                Abbrechen
              </button>
              <button
                onClick={() => {
                  addAusgabe(ausgabeForm.betrag, ausgabeForm.beschreibung, ausgabeForm.datum);
                  setAusgabeForm({ betrag: "", beschreibung: "", datum: todayISO() });
                  setShowAddAusgabe(false);
                }}
                disabled={!ausgabeForm.betrag || !ausgabeForm.beschreibung.trim()}
                className="flex-1 py-2.5 rounded-xl bg-gradient-to-br from-blue-900 to-blue-700 text-white text-sm font-semibold disabled:opacity-40"
              >
                Speichern
              </button>
            </div>
          </div>
        </div>
      )}

      {showAddPlayer && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50">
          <div className="bg-white rounded-2xl p-5 w-full max-w-sm shadow-xl">
            <div className="flex items-center justify-between mb-3">
              <div className="font-semibold text-slate-800">Neuer Spieler</div>
              <button onClick={() => { setShowAddPlayer(false); setNewPlayerName(""); }}>
                <span className="text-slate-400" style={{ fontSize: 20, lineHeight: 1, display: "inline-block" }}>✕</span>
              </button>
            </div>
            <input
              autoFocus
              value={newPlayerName}
              onChange={(e) => setNewPlayerName(e.target.value)}
              placeholder="Name (Nummer)"
              className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-base bg-white text-slate-800 mb-3"
              onKeyDown={(e) => {
                if (e.key === "Enter") {
                  addPlayer(newPlayerName);
                  setNewPlayerName("");
                  setShowAddPlayer(false);
                }
              }}
            />
            <div className="flex gap-2">
              <button
                onClick={() => { setShowAddPlayer(false); setNewPlayerName(""); }}
                className="flex-1 py-2.5 rounded-xl border border-slate-300 text-slate-600 text-sm font-medium"
              >
                Abbrechen
              </button>
              <button
                onClick={() => {
                  addPlayer(newPlayerName);
                  setNewPlayerName("");
                  setShowAddPlayer(false);
                }}
                disabled={!newPlayerName.trim()}
                className="flex-1 py-2.5 rounded-xl bg-gradient-to-br from-blue-900 to-blue-700 text-white text-sm font-semibold disabled:opacity-40"
              >
                Speichern
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<StrafenModul />);
</script>
</body>
</html>
