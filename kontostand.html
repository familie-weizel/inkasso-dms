const FIREBASE_DB_URL = "https://strafenkatalog-fc-d-26-27-default-rtdb.europe-west1.firebasedatabase.app";
const FIREBASE_PATH = "inkasso-data";

const ROSTER_PLAYERS = [
  "Dustin Jund (1)",
  "Fabian Amrhein (2)",
  "Levin Zimmermann (6)",
  "Neven Ivancic (7)",
  "Justin Obika (8)",
  "Sandro Rautenberg (9)",
  "Martin Butov (10)",
  "Mehmet Kaya (11)",
  "Marvin Mettenberger (12)",
  "Nick Schäffauer (13)",
  "Daniel Himmelsbach (16)",
  "Niclas Haller (17)",
  "Issa Boye (18)",
  "Hendrik Gehring (19)",
  "David Dantis (20)",
  "Moritz Güttel (22)",
  "Yannick Berger (23)",
  "Sebastian Weizel (24)",
  "Simon Schultis (27)",
  "Nelio Lemminger (29)",
  "Matthis Eggert (33)",
  "Kristian Disch (44)",
  "Kerim Vanci (55)",
  "Ron Schweizer (99)",
];

const STAFF = [
  "Julian Sutter (Trainer)",
  "Michael Maier (Co-Trainer)",
  "Karl-Peter Schneider (Co-Trainer)",
  "Raphael Baumann (TW-Trainer)",
  "Felix Pustelnik (Physio)",
  "Simon Latzel (Athletik)",
  "Benjamin Böhler (Analyse)",
  "Fabian Sutter (Sportl. Leitung)",
];

const DEFAULT_PLAYERS = [...ROSTER_PLAYERS, ...STAFF];
const STAFF_SET = new Set(STAFF);
function isStaff(name) {
  return STAFF_SET.has(name);
}
function orderPlayers(list) {
  const set = new Set(list);
  const roster = ROSTER_PLAYERS.filter((p) => set.has(p));
  const staff = STAFF.filter((p) => set.has(p));
  const known = new Set([...ROSTER_PLAYERS, ...STAFF]);
  const extras = list.filter((p) => !known.has(p));
  return [...roster, ...extras, ...staff];
}

function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}
function addDaysISO(iso, days) {
  const d = new Date(iso + "T00:00:00");
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}
function fmtDate(iso) {
  if (!iso) return "–";
  const [y, m, d] = iso.split("-");
  return `${d}.${m}.${y}`;
}
function isOverdue(entry) {
  if (entry.bezahlt) return false;
  if (!entry.faelligAm) return false;
  const frist = addDaysISO(entry.faelligAm, 7);
  return todayISO() > frist;
}
function effectiveBetrag(entry) {
  if (entry.art === "kasten") return 0;
  const base = Number(entry.betrag) || 0;
  return isOverdue(entry) ? base * 2 : base;
}
function effectiveKastenAnzahl(entry) {
  const base = Number(entry.kastenAnzahl) || 0;
  return isOverdue(entry) ? base * 2 : base;
}
function formatEntryWert(entry) {
  if (entry.art === "kasten") {
    const eff = effectiveKastenAnzahl(entry);
    return `${eff} ${eff === 1 ? "Kasten" : "Kästen"}`;
  }
  return `${effectiveBetrag(entry).toFixed(2)} €`;
}

function App() {
  const [players, setPlayers] = useState(DEFAULT_PLAYERS);
  const [strafen, setStrafen] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [openPlayer, setOpenPlayer] = useState(null);
  const [lastLoad, setLastLoad] = useState(null);

  async function load() {
    setLoading(true);
    setError(null);
    try {
      const res = await fetch(`${FIREBASE_DB_URL}/${FIREBASE_PATH}.json`);
      if (!res.ok) throw new Error(`Laden fehlgeschlagen (${res.status})`);
      const data = await res.json();
      const loadedPlayers = data && Array.isArray(data.players) && data.players.length ? data.players : DEFAULT_PLAYERS;
      const merged = orderPlayers(Array.from(new Set([...loadedPlayers, ...DEFAULT_PLAYERS])));
      setPlayers(merged);
      setStrafen((data && Array.isArray(data.strafen)) ? data.strafen : []);
      setLastLoad(new Date());
    } catch (e) {
      setError(`Verbindung fehlgeschlagen (${e.message || e}). Prüfe deine Internetverbindung und versuch's nochmal.`);
    } finally {
      setLoading(false);
    }
  }

  useEffect(() => { load(); }, []);

  const summary = useMemo(() => {
    return players.map((p) => {
      const offen = strafen.filter((s) => s.spieler === p && !s.bezahlt);
      const totalEuro = offen.reduce((sum, e) => sum + effectiveBetrag(e), 0);
      const totalKaesten = offen.filter((e) => e.art === "kasten").reduce((sum, e) => sum + effectiveKastenAnzahl(e), 0);
      const sorted = [...offen].sort((a, b) => (a.datum < b.datum ? 1 : -1));
      return { spieler: p, entries: sorted, totalEuro, totalKaesten };
    });
  }, [players, strafen]);

  const spielerListe = summary.filter((s) => !isStaff(s.spieler));
  const staffListe = summary.filter((s) => isStaff(s.spieler));

  function Row({ item }) {
    const isOpen = openPlayer === item.spieler;
    return (
      <div className="bg-white border border-slate-100 rounded-2xl shadow-sm overflow-hidden">
        <button
          onClick={() => setOpenPlayer(isOpen ? null : item.spieler)}
          className="w-full flex items-center justify-between gap-2 px-4 py-3 text-left active:bg-slate-50"
        >
          <span className="font-medium text-slate-800 min-w-0 truncate">{item.spieler}</span>
          <span className="flex items-center gap-2 shrink-0">
            <span className={`font-bold ${item.totalEuro > 0 ? "text-slate-800" : "text-slate-300"}`}>
              {item.totalEuro.toFixed(2)} €
            </span>
            {item.totalKaesten > 0 && (
              <span className="text-xs px-2 py-0.5 rounded-full bg-amber-50 text-amber-700 border border-amber-200">
                📦 {item.totalKaesten}
              </span>
            )}
            <span className="text-slate-300" style={{ fontSize: 14 }}>{isOpen ? "︿" : "﹀"}</span>
          </span>
        </button>
        {isOpen && (
          <div className="border-t border-slate-100 divide-y divide-slate-50">
            {item.entries.length === 0 ? (
              <div className="px-4 py-4 text-sm text-slate-400 text-center">Keine offenen Strafen 🎉</div>
            ) : (
              item.entries.map((e) => (
                <div key={e.id} className="px-4 py-2.5 flex items-center justify-between gap-2">
                  <div className="min-w-0">
                    <div className="text-sm text-slate-700 break-words">{e.regel}</div>
                    <div className="text-xs text-slate-400">{fmtDate(e.datum)}</div>
                  </div>
                  <div className="font-semibold text-slate-800 text-sm shrink-0">{formatEntryWert(e)}</div>
                </div>
              ))
            )}
          </div>
        )}
      </div>
    );
  }

  return (
    <div className="min-h-screen flex flex-col">
      <div className="bg-gradient-to-br from-blue-900 to-blue-700 px-4 pt-6 pb-8 rounded-b-3xl shadow-md">
        <div className="flex items-center gap-3">
          <div className="w-11 h-11 flex items-center justify-center shrink-0 p-0.5">
            <img src={WAPPEN_SRC} alt="FC Denzlingen" className="w-full h-full object-contain drop-shadow-sm" />
          </div>
          <div className="min-w-0 flex-1">
            <div className="text-white font-bold text-lg leading-tight truncate">Kontostand</div>
            <div className="text-blue-100 text-sm truncate">FC Denzlingen · Strafenkasse</div>
          </div>
          <button
            onClick={load}
            aria-label="Aktualisieren"
            className="w-10 h-10 rounded-full bg-white/15 backdrop-blur flex items-center justify-center shrink-0 active:bg-white/25"
          >
            <span style={{ fontSize: 18, color: "white" }}>🔄</span>
          </button>
        </div>
      </div>

      <div className="flex-1 max-w-lg mx-auto w-full p-4 space-y-4 pb-10">
        {error && (
          <div className="bg-amber-50 border border-amber-200 text-amber-800 text-sm rounded-2xl p-3">{error}</div>
        )}

        {loading ? (
          <div className="text-center text-slate-400 py-10">Lädt...</div>
        ) : (
          <>
            <div className="text-xs text-slate-400 text-center px-4">
              Zeigt nur offene, noch nicht bezahlte Strafen &middot; nur zum Ansehen, keine Bearbeitung möglich.
              {lastLoad && <> Stand: {lastLoad.toLocaleDateString("de-DE")}, {lastLoad.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" })} Uhr</>}
            </div>

            <div className="space-y-2">
              {spielerListe.map((item) => (
                <Row key={item.spieler} item={item} />
              ))}
            </div>

            {staffListe.length > 0 && (
              <>
                <div className="text-xs font-bold text-slate-400 uppercase tracking-wide px-1 pt-2">Trainer &amp; Staff</div>
                <div className="space-y-2">
                  {staffListe.map((item) => (
                    <Row key={item.spieler} item={item} />
                  ))}
                </div>
              </>
            )}
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
